kind = "web"
previewPath = "/"
title = "Agentic Legacy Modernization"
version = "1.0.0"
id = "artifacts/legacy-modernization-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21168

[services.development]
run = "pnpm --filter @workspace/legacy-modernization-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/legacy-modernization-ui", "run", "build" ]
publicDir = "artifacts/legacy-modernization-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21168"
BASE_PATH = "/"
