services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: clean-assets-backend
    environment:
      PORT: 3000
      NODE_ENV: production
      AI_INTEGRATIONS_OPENAI_BASE_URL: ${AI_INTEGRATIONS_OPENAI_BASE_URL:-https://api.openai.com/v1}
      AI_INTEGRATIONS_OPENAI_API_KEY: ${AI_INTEGRATIONS_OPENAI_API_KEY:-}
    expose:
      - "3000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
      args:
        PORT: 21168
        BASE_PATH: /
        VITE_API_BASE_URL: /api/
    container_name: clean-assets-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped
